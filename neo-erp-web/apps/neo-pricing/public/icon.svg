<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be123c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Shadow/Glow -->
  <rect x="128" y="128" width="256" height="256" rx="48" fill="#f43f5e" opacity="0.15" filter="blur(20px)" />
  <!-- Price Tag Vector Icon -->
  <g transform="translate(128, 128)">
    <rect width="256" height="256" rx="48" fill="url(#grad)" />
    <!-- Tag details -->
    <!-- Punch Hole -->
    <circle cx="190" cy="66" r="16" fill="#0f172a" />
    <!-- Line Detail -->
    <path d="M 64,128 L 192,128" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.3" />
    <!-- Price text outline -->
    <path d="M 64,170 H 160" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>
