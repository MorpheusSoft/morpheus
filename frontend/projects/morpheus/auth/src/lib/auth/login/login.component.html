<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-sm" style="width: 100%; max-width: 400px;">
    <div class="text-center mb-4">
      <h3 class="fw-bold text-primary">Morpheus ERP</h3>
      <p class="text-muted">Inventory Management</p>
    </div>

    <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" formControlName="email" placeholder="user@example.com">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" formControlName="password" placeholder="******">
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading || loginForm.invalid">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        Sign In
      </button>
    </form>
    
    <div class="mt-3 text-center text-muted small">
      <p>© 2026 Morpheus Systems</p>
    </div>
  </div>
</div>
